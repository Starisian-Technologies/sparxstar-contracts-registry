name: Dispatch Contract Change

# Change-dispatch. On a contract merge to main, notify the consumers bound to the
# changed contract(s) so they re-run conformance instead of silently drifting.
# The registry PUSHES the signal (repository_dispatch); consumers PULL the content
# (their conformance run fetches the pinned contract fresh).
#
# TOKEN:
#   Cross-repo repository_dispatch writes into the target consumer repos. This
#   workflow follows the repository's existing write-token pattern and mints the
#   contract-sync App token scoped to those repositories. The App installation on
#   each consumer repo must include permission to send repository_dispatch events.

on:
  push:
    branches: [main]
    paths:
      - "Contracts/**"
      - "MANIFEST.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dispatch-contract-change
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
          fetch-tags: true

      - name: Resolve changed contracts and their consumers
        id: resolve
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess

          # Changed files since the previous commit (best-effort on first push).
          try:
              base = subprocess.check_output(["git", "rev-parse", "HEAD~1"]).decode().strip()
          except subprocess.CalledProcessError:
              base = None
          rng = [f"{base}", "HEAD"] if base else ["HEAD"]
          diff = subprocess.check_output(["git", "diff", "--name-only", *rng]).decode().splitlines()

          manifest = json.load(open("MANIFEST.json"))
          contracts = manifest.get("contracts", {})

          changed_ids, consumers = set(), set()
          for path in diff:
              for cid, c in contracts.items():
                  base_path = c.get("path", "").rstrip("/")
                  if base_path and (path == base_path or path.startswith(base_path + "/")):
                      changed_ids.add(cid)
                      for repo in c.get("consumers", []):
                          consumers.add(repo)

          # Short repo names (owner stripped) for the App-token `repositories` scope.
          repo_short = sorted({r.split("/", 1)[1] for r in consumers if "/" in r})

          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              f.write(f"changed={json.dumps(sorted(changed_ids))}\n")
              f.write(f"consumers={json.dumps(sorted(consumers))}\n")
              # repositories is a single-line GITHUB_OUTPUT value; the App-token
              # action accepts a comma-separated list.
              f.write(f"repositories={','.join(repo_short)}\n")
              f.write(f"has_consumers={'true' if consumers else 'false'}\n")

          print(f"Changed contracts: {sorted(changed_ids)}")
          print(f"Consumers to notify: {sorted(consumers)}")
          PYEOF

      - name: Resolve recommended tag
        id: ver
        if: steps.resolve.outputs.has_consumers == 'true'
        run: |
          rec="$(git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)"
          echo "recommended=${rec}" >> "$GITHUB_OUTPUT"

      # Cross-repo dispatch is a write into consumer repositories, so this mint
      # follows the same contract-sync WRITE-token pattern used elsewhere in the
      # registry for write operations.
      - name: Mint contract-sync token (scoped to consumer repos)
        id: app-token
        if: steps.resolve.outputs.has_consumers == 'true'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CONTRACT_SYNC_CLIENT_ID }}
          private-key: ${{ secrets.CONTRACT_SYNC_PRIVATE_KEY }}
          owner: Starisian-Technologies
          repositories: ${{ steps.resolve.outputs.repositories }}

      - name: Dispatch contract-changed to each consumer
        if: steps.resolve.outputs.has_consumers == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CONSUMERS: ${{ steps.resolve.outputs.consumers }}
          CHANGED: ${{ steps.resolve.outputs.changed }}
          RECOMMENDED: ${{ steps.ver.outputs.recommended }}
          REGISTRY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          echo "$CONSUMERS" | jq -r '.[]' | while read -r consumer; do
            echo "Dispatching contract-changed -> ${consumer}"
            # Build the full dispatch body so client_payload is a real JSON object
            # (not a string), then POST it via --input -.
            jq -n \
              --argjson contracts "$CHANGED" \
              --arg registry "$REGISTRY" \
              --arg recommended "$RECOMMENDED" \
              --arg sha "$SHA" \
              --arg ref "$REF" \
              '{event_type:"contract-changed",
                client_payload:{registry:$registry, contracts:$contracts,
                                recommended:$recommended, sha:$sha, ref:$ref}}' \
            | gh api --method POST "repos/${consumer}/dispatches" --input - \
              || echo "::warning::dispatch to ${consumer} failed (App not installed or no permission?)"
          done
